<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RAMP Builder</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap');

            :root {
                --navy: #16233b;
                --navy-2: #22365a;
                --bg: #eef1f6;
                --paper: #ffffff;
                --ink: #1c2433;
                --muted: #69768a;
                --line: #dbe1ea;
                --accent: #2f6690;
                --accent-light: #e4eef6;
                --vl-bg: #cfe8c0;
                --vl-text: #2f5d24;
                --l-bg: #a9d18e;
                --l-text: #2f5d24;
                --m-bg: #ffd773;
                --m-text: #6b4a05;
                --h-bg: #f3a667;
                --h-text: #6b3300;
                --vh-bg: #e2574c;
                --vh-text: #ffffff;
            }

            * {
                box-sizing: border-box;
            }
            html,
            body {
                margin: 0;
                padding: 0;
            }
            body {
                font-family: 'IBM Plex Sans', sans-serif;
                background:
                    linear-gradient(var(--bg) 1px, transparent 1px) 0 0/100%
                        32px,
                    var(--bg);
                color: var(--ink);
                -webkit-font-smoothing: antialiased;
                min-height: 100vh;
            }
            h1,
            h2,
            h3,
            .brand,
            .btn,
            .tab,
            th,
            .section-label,
            .risk-badge,
            .template-card h3 {
                font-family: 'Space Grotesk', sans-serif;
            }
            .code {
                font-family: 'IBM Plex Mono', monospace;
                letter-spacing: 0.02em;
            }

            a {
                color: var(--accent);
            }

            /* ---------- Top bar ---------- */
            .topbar {
                position: sticky;
                top: 0;
                z-index: 50;
                background: var(--navy);
                color: #fff;
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 20px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
            }
            .brand {
                font-weight: 700;
                font-size: 1.15rem;
                letter-spacing: 0.02em;
                display: flex;
                align-items: center;
                gap: 8px;
                cursor: pointer;
                user-select: none;
            }
            .brand .mark {
                display: inline-grid;
                grid-template-columns: 1fr 1fr;
                grid-template-rows: 1fr 1fr;
                width: 22px;
                height: 22px;
                border-radius: 4px;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.25);
            }
            .brand .mark span {
                display: block;
            }
            .brand .mark span:nth-child(1) {
                background: var(--vl-bg);
            }
            .brand .mark span:nth-child(2) {
                background: var(--m-bg);
            }
            .brand .mark span:nth-child(3) {
                background: var(--h-bg);
            }
            .brand .mark span:nth-child(4) {
                background: var(--vh-bg);
            }
            .topbar .spacer {
                flex: 1;
            }
            .topbar .ramp-title-input {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.18);
                color: #fff;
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: 1rem;
                padding: 7px 12px;
                border-radius: 6px;
                min-width: 160px;
                max-width: 360px;
            }
            .topbar .ramp-title-input::placeholder {
                color: rgba(255, 255, 255, 0.5);
            }
            .topbar .ramp-title-input:focus {
                outline: 2px solid var(--accent-light);
                background: rgba(255, 255, 255, 0.14);
            }
            .save-status {
                font-size: 0.78rem;
                color: rgba(255, 255, 255, 0.65);
                white-space: nowrap;
                min-width: 84px;
            }

            /* ---------- Buttons ---------- */
            .btn {
                font-size: 0.85rem;
                font-weight: 600;
                letter-spacing: 0.01em;
                border: 1px solid var(--line);
                background: var(--paper);
                color: var(--ink);
                padding: 8px 14px;
                border-radius: 7px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                transition:
                    transform 0.04s ease,
                    box-shadow 0.15s ease,
                    background 0.15s ease;
            }
            .btn:hover {
                box-shadow: 0 2px 6px rgba(22, 35, 59, 0.12);
            }
            .btn:active {
                transform: translateY(1px);
            }
            .btn-primary {
                background: var(--accent);
                border-color: var(--accent);
                color: #fff;
            }
            .btn-primary:hover {
                background: #265574;
            }
            .btn-ghost {
                background: transparent;
                border-color: rgba(255, 255, 255, 0.3);
                color: #fff;
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .btn-danger {
                color: #a3271f;
                border-color: #f0c9c5;
            }
            .btn-danger:hover {
                background: #fdeceb;
            }
            .btn-sm {
                padding: 5px 10px;
                font-size: 0.78rem;
            }
            .btn[disabled] {
                opacity: 0.5;
                cursor: not-allowed;
            }

            /* ---------- Layout shells ---------- */
            .page {
                max-width: 1080px;
                margin: 0 auto;
                padding: 28px 20px 80px;
            }
            .hidden {
                display: none !important;
            }

            /* ---------- Home ---------- */
            .hero {
                display: grid;
                grid-template-columns: 1.1fr 0.9fr;
                gap: 36px;
                align-items: center;
                background: var(--navy);
                color: #fff;
                border-radius: 14px;
                padding: 40px;
                margin-bottom: 36px;
                overflow: hidden;
                position: relative;
            }
            .hero h1 {
                font-size: 2.1rem;
                line-height: 1.15;
                margin: 0 0 12px;
                font-weight: 700;
            }
            .hero p {
                color: rgba(255, 255, 255, 0.78);
                line-height: 1.55;
                max-width: 46ch;
            }
            .hero .eyebrow {
                font-family: 'IBM Plex Mono', monospace;
                font-size: 0.75rem;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--m-bg);
                margin-bottom: 14px;
            }
            .matrix-wrap {
                justify-self: center;
            }
            .matrix-table {
                border-collapse: collapse;
                font-family: 'IBM Plex Mono', monospace;
                font-size: 0.72rem;
            }
            .matrix-table th,
            .matrix-table td {
                width: 42px;
                height: 34px;
                text-align: center;
                border: 1px solid rgba(255, 255, 255, 0.18);
            }
            .matrix-table th {
                color: rgba(255, 255, 255, 0.6);
                font-weight: 600;
                font-size: 0.65rem;
            }
            .matrix-table td.cell {
                font-weight: 700;
            }
            .matrix-table .corner {
                border: none;
            }
            .matrix-table .axis {
                color: rgba(255, 255, 255, 0.55);
                font-size: 0.62rem;
                font-family: 'Space Grotesk', sans-serif;
            }
            .risk-VL {
                background: var(--vl-bg);
                color: var(--vl-text);
            }
            .risk-L {
                background: var(--l-bg);
                color: var(--l-text);
            }
            .risk-M {
                background: var(--m-bg);
                color: var(--m-text);
            }
            .risk-H {
                background: var(--h-bg);
                color: var(--h-text);
            }
            .risk-VH {
                background: var(--vh-bg);
                color: var(--vh-text);
            }

            .section-label {
                font-size: 0.78rem;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--muted);
                margin: 0 0 14px;
                font-weight: 600;
            }
            .template-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
                gap: 14px;
                margin-bottom: 36px;
            }
            .template-card {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 18px;
                cursor: pointer;
                transition:
                    box-shadow 0.15s ease,
                    border-color 0.15s ease;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .template-card:hover {
                box-shadow: 0 4px 14px rgba(22, 35, 59, 0.1);
                border-color: var(--accent);
            }
            .template-card h3 {
                margin: 0;
                font-size: 1.02rem;
            }
            .template-card p {
                margin: 0;
                font-size: 0.85rem;
                color: var(--muted);
                line-height: 1.5;
                flex: 1;
            }
            .template-card .meta {
                font-family: 'IBM Plex Mono', monospace;
                font-size: 0.72rem;
                color: var(--accent);
            }
            .template-card.blank {
                border-style: dashed;
                align-items: center;
                justify-content: center;
                text-align: center;
                color: var(--muted);
            }
            .template-card.blank h3 {
                color: var(--ink);
            }

            .saved-list {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 10px;
                overflow: hidden;
            }
            .saved-row {
                display: flex;
                align-items: center;
                gap: 14px;
                padding: 12px 16px;
                border-bottom: 1px solid var(--line);
            }
            .saved-row:last-child {
                border-bottom: none;
            }
            .saved-row .name {
                font-weight: 600;
                flex: 1;
                cursor: pointer;
            }
            .saved-row .name:hover {
                color: var(--accent);
            }
            .saved-row .date {
                font-size: 0.78rem;
                color: var(--muted);
                font-family: 'IBM Plex Mono', monospace;
            }
            .empty-note {
                color: var(--muted);
                font-size: 0.9rem;
                padding: 18px;
                text-align: center;
            }

            /* ---------- Editor ---------- */
            .editor-grid {
                display: grid;
                grid-template-columns: 1fr 280px;
                gap: 24px;
                align-items: start;
            }
            @media (max-width: 880px) {
                .editor-grid {
                    grid-template-columns: 1fr;
                }
                .side {
                    order: -1;
                }
            }

            .card {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 10px;
                padding: 20px;
                margin-bottom: 20px;
            }
            .card h2 {
                margin: 0 0 14px;
                font-size: 1rem;
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .field-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
                gap: 12px;
            }
            .field label {
                display: block;
                font-size: 0.75rem;
                color: var(--muted);
                margin-bottom: 4px;
                font-weight: 600;
                letter-spacing: 0.02em;
            }
            .field input,
            .field textarea,
            .field select {
                width: 100%;
                font-family: inherit;
                font-size: 0.9rem;
                padding: 8px 10px;
                border: 1px solid var(--line);
                border-radius: 6px;
                background: #fcfdfe;
                color: var(--ink);
            }
            .field input:focus,
            .field textarea:focus,
            .field select:focus {
                outline: 2px solid var(--accent-light);
                border-color: var(--accent);
            }
            textarea {
                resize: vertical;
                min-height: 60px;
                line-height: 1.5;
            }

            /* ---------- Side panel ---------- */
            .side .card {
                position: sticky;
                top: 90px;
            }
            .overall-risk {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding: 14px;
                border-radius: 8px;
                background: var(--accent-light);
                margin-bottom: 14px;
            }
            .overall-risk .lbl {
                font-size: 0.78rem;
                color: var(--muted);
                font-weight: 600;
                letter-spacing: 0.06em;
                text-transform: uppercase;
            }
            .risk-badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 10px;
                border-radius: 999px;
                font-size: 0.78rem;
                font-weight: 700;
                font-family: 'IBM Plex Mono', monospace;
                white-space: nowrap;
            }
            .risk-badge .code {
                opacity: 0.85;
                font-weight: 600;
            }
            .risk-badge.size-lg {
                font-size: 1rem;
                padding: 7px 14px;
            }
            .mini-matrix {
                font-size: 0.62rem;
            }
            .mini-matrix table {
                border-collapse: collapse;
                width: 100%;
            }
            .mini-matrix th,
            .mini-matrix td {
                border: 1px solid var(--line);
                text-align: center;
                padding: 3px 2px;
                font-family: 'IBM Plex Mono', monospace;
            }
            .mini-matrix th {
                background: var(--accent-light);
                font-weight: 600;
                color: var(--accent);
            }
            .legend {
                display: flex;
                flex-direction: column;
                gap: 6px;
                margin-top: 10px;
                font-size: 0.75rem;
            }
            .legend .row {
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .legend .swatch {
                width: 16px;
                height: 16px;
                border-radius: 3px;
            }

            /* ---------- Categories & hazards ---------- */
            .category {
                background: var(--paper);
                border: 1px solid var(--line);
                border-radius: 10px;
                margin-bottom: 18px;
                overflow: hidden;
            }
            .category > .cat-head {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 14px 16px;
                background: var(--navy-2);
                color: #fff;
            }
            .category > .cat-head input.cat-name {
                flex: 1;
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: #fff;
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: 0.98rem;
                padding: 6px 10px;
                border-radius: 6px;
            }
            .category > .cat-head input.cat-name:focus {
                outline: 2px solid var(--accent-light);
                background: rgba(255, 255, 255, 0.14);
            }
            .cat-body {
                padding: 14px 16px;
            }
            .restore-row {
                margin: 12px 0 0;
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
            }
            .restore-note {
                font-size: 0.82rem;
                color: var(--muted);
                margin-right: 6px;
                flex: 1 1 100%;
            }
            .restore-row .btn {
                background: #f0f4ff;
                border-color: #c7d5f0;
                color: #1f3f7a;
            }
            .restore-row .btn:hover {
                background: #dbe6ff;
            }
            .hazard {
                border: 1px solid var(--line);
                border-radius: 8px;
                padding: 14px;
                margin-bottom: 12px;
                background: #fafcfe;
            }
            .hazard:last-child {
                margin-bottom: 0;
            }
            .hazard-head {
                display: flex;
                gap: 10px;
                align-items: flex-start;
                margin-bottom: 10px;
            }
            .hazard-head input.haz-name {
                flex: 1;
                font-family: 'Space Grotesk', sans-serif;
                font-weight: 600;
                font-size: 0.95rem;
                padding: 8px 10px;
                border: 1px solid var(--line);
                border-radius: 6px;
                background: #fff;
            }
            .risk-row {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)) auto;
                gap: 10px;
                align-items: end;
                margin-bottom: 10px;
            }
            .risk-row .badge-wrap {
                display: flex;
                align-items: center;
                gap: 6px;
                padding-bottom: 1px;
            }
            .risk-row .stage-label {
                font-size: 0.7rem;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
                font-weight: 700;
                grid-column: 1 / -1;
                margin-top: 6px;
            }
            .risk-row .stage-label:first-child {
                margin-top: 0;
            }
            .lock-note {
                font-size: 0.7rem;
                color: var(--muted);
                display: flex;
                align-items: center;
                gap: 4px;
                margin-top: 4px;
            }
            select[disabled] {
                background: #eef1f5;
                color: var(--muted);
                cursor: not-allowed;
            }

            .add-row {
                display: flex;
                gap: 10px;
                margin-top: 6px;
            }
            .no-hazards {
                color: var(--muted);
                font-size: 0.85rem;
                padding: 8px 0;
            }

            .app-empty {
                text-align: center;
                padding: 60px 20px;
                color: var(--muted);
            }
            .app-empty h2 {
                color: var(--ink);
                font-size: 1.2rem;
                margin-bottom: 8px;
            }

            footer.foot {
                text-align: center;
                color: var(--muted);
                font-size: 0.78rem;
                padding: 20px;
                font-family: 'IBM Plex Mono', monospace;
            }

            /* ---------- Print ---------- */
            #print-area {
                display: none;
            }
            @media print {
                body {
                    background: #fff;
                }
                .topbar,
                .page,
                footer.foot {
                    display: none !important;
                }
                #print-area {
                    display: block;
                }
                #print-area h1 {
                    font-family: 'Space Grotesk', sans-serif;
                    font-size: 1.4rem;
                    margin-bottom: 2px;
                }
                #print-area h2 {
                    font-family: 'Space Grotesk', sans-serif;
                    font-size: 1rem;
                    margin: 18px 0 6px;
                    border-bottom: 2px solid var(--navy);
                    padding-bottom: 4px;
                }
                #print-area .print-meta {
                    font-size: 0.8rem;
                    color: #444;
                    margin-bottom: 14px;
                }
                #print-area .print-meta table {
                    width: 100%;
                    border-collapse: collapse;
                    font-size: 0.8rem;
                }
                #print-area .print-meta td {
                    padding: 3px 6px;
                    border: 1px solid #ccc;
                    vertical-align: top;
                }
                #print-area .print-meta td.k {
                    font-weight: 700;
                    background: #f3f4f6;
                    width: 140px;
                }
                #print-area .ramp-overall {
                    font-size: 0.85rem;
                    margin-bottom: 10px;
                }
                #print-area .context {
                    font-size: 0.85rem;
                    line-height: 1.5;
                    margin-bottom: 10px;
                    white-space: pre-wrap;
                }
                #print-area table.hazards {
                    width: 100%;
                    border-collapse: collapse;
                    font-size: 0.78rem;
                    margin-bottom: 6px;
                }
                #print-area table.hazards th,
                #print-area table.hazards td {
                    border: 1px solid #bbb;
                    padding: 6px;
                    text-align: left;
                    vertical-align: top;
                }
                #print-area table.hazards th {
                    background: #eef1f6;
                    font-family: 'Space Grotesk', sans-serif;
                }
                #print-area table.hazards td.risk-cell {
                    text-align: center;
                    font-family: 'IBM Plex Mono', monospace;
                    font-weight: 700;
                    white-space: nowrap;
                }
                #print-area table.hazards tr {
                    page-break-inside: avoid;
                }
                #print-area .cat-risk {
                    font-family: 'IBM Plex Mono', monospace;
                    font-weight: 700;
                    padding: 2px 8px;
                    border-radius: 4px;
                    font-size: 0.75rem;
                }
                #print-area .print-foot {
                    margin-top: 24px;
                    font-size: 0.7rem;
                    color: #888;
                    font-family: 'IBM Plex Mono', monospace;
                }
                * {
                    print-color-adjust: exact;
                    -webkit-print-color-adjust: exact;
                }
            }
        </style>
    </head>
    <body>
        <div class="topbar">
            <div class="brand" id="brand-home" title="Back to home">
                <span class="mark"
                    ><span></span><span></span><span></span><span></span
                ></span>
                RAMP Builder
            </div>
            <input
                id="ramp-title-input"
                class="ramp-title-input hidden"
                placeholder="Untitled RAMP"
                maxlength="120"
            />
            <div class="spacer"></div>
            <span id="save-status" class="save-status"></span>
            <button
                class="btn btn-ghost hidden"
                id="btn-export"
                title="Export this RAMP as a JSON file"
            >
                Export JSON
            </button>
            <button class="btn btn-ghost hidden" id="btn-print">
                Print / Save as PDF
            </button>
        </div>

        <div class="page" id="page"></div>

        <div id="print-area"></div>

        <footer class="foot">
            RAMP Builder — data is stored on this device/account, not sent
            anywhere else.
        </footer>

        <input
            type="file"
            id="import-input"
            accept="application/json"
            class="hidden"
        />

        <script>
            /* =========================================================================
   RISK MODEL — based on the AAFC SRM Definitions and Risk Matrix
   ========================================================================= */
            const LIKELIHOODS = [
                { v: 1, label: 'Rare' },
                { v: 2, label: 'Improbable' },
                { v: 3, label: 'Occasional' },
                { v: 4, label: 'Probable' },
                { v: 5, label: 'Almost Certain' },
            ];
            const CONSEQUENCES = [
                { v: 'A', label: 'Minor' },
                { v: 'B', label: 'Moderate' },
                { v: 'C', label: 'Major' },
                { v: 'D', label: 'Critical' },
                { v: 'E', label: 'Catastrophic' },
            ];
            // matrix[likelihood][consequence] -> risk level code
            const RISK_MATRIX = {
                1: { A: 'VL', B: 'VL', C: 'VL', D: 'L', E: 'L' },
                2: { A: 'VL', B: 'VL', C: 'L', D: 'M', E: 'M' },
                3: { A: 'VL', B: 'L', C: 'M', D: 'H', E: 'H' },
                4: { A: 'L', B: 'M', C: 'H', D: 'H', E: 'VH' },
                5: { A: 'L', B: 'M', C: 'H', D: 'VH', E: 'VH' },
            };
            const RISK_LEVELS = {
                VL: { label: 'Very Low', order: 1 },
                L: { label: 'Low', order: 2 },
                M: { label: 'Medium', order: 3 },
                H: { label: 'High', order: 4 },
                VH: { label: 'Very High', order: 5 },
            };

            function getRisk(likelihood, consequence) {
                const level = (RISK_MATRIX[likelihood] || {})[consequence];
                if (!level) return { code: '—', level: null, label: '—' };
                return {
                    code: `${consequence}${likelihood}`,
                    level,
                    label: RISK_LEVELS[level].label,
                };
            }
            function likelihoodLabel(v) {
                const m = LIKELIHOODS.find((l) => l.v === Number(v));
                return m ? m.label : v;
            }
            function consequenceLabel(v) {
                const m = CONSEQUENCES.find((c) => c.v === v);
                return m ? m.label : v;
            }
            function riskBadgeHTML(likelihood, consequence, size) {
                const r = getRisk(likelihood, consequence);
                if (!r.level)
                    return `<span class="risk-badge${size ? ' size-' + size : ''}">—</span>`;
                return `<span class="risk-badge risk-${r.level}${size ? ' size-' + size : ''}">
            <span class="code">${r.code}</span> ${r.level} · ${r.label}
          </span>`;
            }
            function likelihoodOptions(selected) {
                let html = '';
                if (selected === null) {
                    html +=
                        '<option value="" selected disabled>Select...</option>';
                }
                html += LIKELIHOODS.map(
                    (l) =>
                        `<option value="${l.v}"${Number(selected) === l.v ? ' selected' : ''}>${l.v} – ${l.label}</option>`,
                ).join('');
                return html;
            }
            function consequenceOptions(selected) {
                let html = '';
                if (selected === null) {
                    html +=
                        '<option value="" selected disabled>Select...</option>';
                }
                html += CONSEQUENCES.map(
                    (c) =>
                        `<option value="${c.v}"${selected === c.v ? ' selected' : ''}>${c.v} – ${c.label}</option>`,
                ).join('');
                return html;
            }

            /* =========================================================================

            const IDX_KEY = 'ramp-index';

            async function loadIndex() {
                try {
                    const res = await window.localStorage.getItem(
                        IDX_KEY,
                        false,
                    );
                    return res ? JSON.parse(res.value) : [];
                } catch (e) {
                    return [];
                }
            }
            async function saveIndex(index) {
                try {
                    await window.localStorage.setItem(
                        IDX_KEY,
                        JSON.stringify(index),
                        false,
                    );
                } catch (e) {
                    console.error(e);
                }
            }
            async function loadRampFromStorage(id) {
                try {
                    const res = await window.localStorage.getItem(
                        'ramp-' + id,
                        false,
                    );
                    return res ? JSON.parse(res) : null;
                } catch (e) {
                    return null;
                }
            }
            async function saveRampToStorage(ramp) {
                try {
                    await window.localStorage.setItem(
                        'ramp-' + ramp.id,
                        JSON.stringify(ramp),
                        false,
                    );
                    return true;
                } catch (e) {
                    console.error(e);
                    return false;
                }
            }
            async function deleteRampFromStorage(id) {
                try {
                    await window.storage.delete('ramp-' + id, false);
                } catch (e) {
                    /* ignore */
                }
            }

            /* =========================================================================
   STATE & HELPERS
   ========================================================================= */
            let state = {
                view: 'home', // 'home' | 'editor'
                ramp: null,
                index: [], // [{id, name, updatedAt}]
            };
            let saveTimer = null;

            function uid(prefix) {
                return (
                    prefix +
                    '_' +
                    Date.now().toString(36) +
                    Math.random().toString(36).slice(2, 7)
                );
            }

            function blankRamp() {
                return {
                    id: uid('ramp'),
                    name: '',
                    templateId: null,
                    templateData: null,
                    details: {
                        owner: '',
                        activityType: '',
                        location: '',
                        startDate: '',
                        endDate: '',
                        preparedBy: '',
                        consultedWith: '',
                        approvedBy: '',
                    },
                    context: '',
                    categories: [],
                    createdAt: Date.now(),
                    updatedAt: Date.now(),
                };
            }

            function rampFromTemplate(tpl) {
                const ramp = blankRamp();
                ramp.name = tpl.name;
                ramp.templateId = tpl.id;
                ramp.templateData = {
                    context: tpl.data.context || '',
                    categories: (tpl.data.categories || []).map((cat) => {
                        const templateCategoryId = uid('tcat');
                        return {
                            templateCategoryId,
                            name: cat.name,
                            hazards: (cat.hazards || []).map((h) => ({
                                templateHazardId: uid('thaz'),
                                name: h.name,
                                initL: h.initL,
                                initC: h.initC,
                                plan: h.plan || '',
                                locked: h.locked || false,
                            })),
                        };
                    }),
                };
                ramp.context = ramp.templateData.context;
                ramp.categories = ramp.templateData.categories.map((cat) => ({
                    id: uid('cat'),
                    templateCategoryId: cat.templateCategoryId,
                    name: cat.name,
                    hazards: cat.hazards
                        .filter((h) => h.locked)
                        .map((h) => ({
                            id: uid('haz'),
                            templateHazardId: h.templateHazardId,
                            name: h.name,
                            initL: h.initL,
                            initC: h.initC,
                            plan: h.plan || '',
                            resL: null,
                            resC: null,
                            locked: h.locked,
                        })),
                }));
                return ramp;
            }

            function newHazard() {
                return {
                    id: uid('haz'),
                    name: '',
                    initL: 1,
                    initC: 'A',
                    plan: '',
                    resL: 1,
                    resC: 'A',
                    locked: false,
                };
            }
            function newCategory() {
                return { id: uid('cat'), name: 'New Category', hazards: [] };
            }

            function findCategory(catId) {
                return state.ramp.categories.find((c) => c.id === catId);
            }
            function findHazard(catId, hazId) {
                const cat = findCategory(catId);
                return cat ? cat.hazards.find((h) => h.id === hazId) : null;
            }

            function categoryRisk(cat) {
                let best = null;
                cat.hazards.forEach((h) => {
                    const r = getRisk(h.resL, h.resC);
                    if (
                        r.level &&
                        (!best ||
                            RISK_LEVELS[r.level].order >
                                RISK_LEVELS[best].order)
                    )
                        best = r.level;
                });
                return best;
            }
            function categoryHasLockedHazards(cat) {
                return cat.hazards.some((h) => h.locked);
            }
            function findTemplateCategory(cat) {
                const templateCats = state.ramp.templateData?.categories || [];
                if (!templateCats.length) return null;
                let match = templateCats.find(
                    (tc) => tc.templateCategoryId === cat.templateCategoryId,
                );
                if (!match) {
                    match = templateCats.find((tc) => tc.name === cat.name);
                }
                return match || null;
            }
            function getMissingTemplateHazards(cat) {
                const templateCat = findTemplateCategory(cat);
                if (!templateCat) return [];
                return templateCat.hazards.filter(
                    (th) =>
                        !cat.hazards.some(
                            (h) => h.templateHazardId === th.templateHazardId,
                        ),
                );
            }
            function restoreTemplateHazard(catId, templateHazardId) {
                const cat = findCategory(catId);
                const templateCat = cat ? findTemplateCategory(cat) : null;
                if (!cat || !templateCat) return;
                const th = templateCat.hazards.find(
                    (h) => h.templateHazardId === templateHazardId,
                );
                if (!th) return;

                const existingTemplateHazardIds = cat.hazards.map(
                    (h) => h.templateHazardId,
                );
                const insertIndex = templateCat.hazards.findIndex(
                    (h) => h.templateHazardId === templateHazardId,
                );
                const beforeCount = templateCat.hazards
                    .slice(0, insertIndex)
                    .filter((h) =>
                        existingTemplateHazardIds.includes(h.templateHazardId),
                    ).length;

                cat.hazards.splice(beforeCount, 0, {
                    id: uid('haz'),
                    templateHazardId: th.templateHazardId,
                    name: th.name,
                    initL: th.initL,
                    initC: th.initC,
                    plan: th.plan || '',
                    resL: null,
                    resC: null,
                    locked: th.locked || false,
                });
            }
            function overallRisk() {
                let best = null;
                (state.ramp.categories || []).forEach((cat) => {
                    const cr = categoryRisk(cat);
                    if (
                        cr &&
                        (!best ||
                            RISK_LEVELS[cr].order > RISK_LEVELS[best].order)
                    )
                        best = cr;
                });
                return best;
            }
            function riskBadgeFromLevel(level, size) {
                if (!level)
                    return `<span class="risk-badge${size ? ' size-' + size : ''}">—</span>`;
                return `<span class="risk-badge risk-${level}${size ? ' size-' + size : ''}">${level} · ${RISK_LEVELS[level].label}</span>`;
            }

            /* =========================================================================
   SCHEDULED SAVE
   ========================================================================= */
            function scheduleSave() {
                setSaveStatus('Editing…');
                if (saveTimer) clearTimeout(saveTimer);
                saveTimer = setTimeout(doSave, 800);
            }
            async function doSave() {
                if (!state.ramp) return;
                setSaveStatus('Saving…');
                state.ramp.updatedAt = Date.now();
                const ok = await saveRampToStorage(state.ramp);
                // update index
                const idx = state.index.find((r) => r.id === state.ramp.id);
                const entry = {
                    id: state.ramp.id,
                    name: state.ramp.name || 'Untitled RAMP',
                    updatedAt: state.ramp.updatedAt,
                };
                if (idx) Object.assign(idx, entry);
                else state.index.push(entry);
                await saveIndex(state.index);
                setSaveStatus(ok ? 'Saved' : 'Save failed');
            }
            function setSaveStatus(text) {
                const el = document.getElementById('save-status');
                if (el) el.textContent = text;
            }

            /* =========================================================================
   RENDER: SHARED PIECES
   ========================================================================= */
            function renderHeroMatrix() {
                // rows = likelihood 5 -> 1, cols = consequence A -> E
                let rows = '';
                for (let l = 5; l >= 1; l--) {
                    let cells = `<th class="axis">${l}</th>`;
                    CONSEQUENCES.forEach((c) => {
                        const level = RISK_MATRIX[l][c.v];
                        cells += `<td class="cell risk-${level}">${c.v}${l}</td>`;
                    });
                    rows += `<tr>${cells}</tr>`;
                }
                const header = `<tr><th class="corner"></th>${CONSEQUENCES.map((c) => `<th>${c.v}</th>`).join('')}</tr>`;
                return `<table class="matrix-table">${header}${rows}</table>`;
            }

            function renderLegend() {
                return Object.entries(RISK_LEVELS)
                    .map(
                        ([code, info]) =>
                            `<div class="row"><span class="swatch risk-${code}"></span><span>${code} — ${info.label}</span></div>`,
                    )
                    .join('');
            }

            /* =========================================================================
   RENDER: HOME
   ========================================================================= */
            function renderHome() {
                const cards = TEMPLATES.map(
                    (t) => `
    <div class="template-card" data-action="new-from-template" data-template-id="${t.id}">
      <h3>${escapeHTML(t.name)}</h3>
      <p>${escapeHTML(t.description)}</p>
      <div class="meta">${t.data.categories.length} categories · ${t.data.categories.reduce((n, c) => n + c.hazards.length, 0)} hazards</div>
    </div>
  `,
                ).join('');

                const blankCard = `
    <div class="template-card blank" data-action="new-blank">
      <h3>+ Start blank</h3>
      <p>Build a RAMP from scratch with no pre-filled hazards.</p>
    </div>`;

                let savedHTML = '';
                if (state.index.length === 0) {
                    savedHTML = `<div class="saved-list"><div class="empty-note">No saved RAMPs yet. Start one above — it will be saved automatically.</div></div>`;
                } else {
                    const rows = [...state.index]
                        .sort((a, b) => b.updatedAt - a.updatedAt)
                        .map(
                            (r) => `
        <div class="saved-row">
          <span class="name" data-action="open-ramp" data-ramp-id="${r.id}">${escapeHTML(r.name || 'Untitled RAMP')}</span>
          <span class="date">updated ${formatDate(r.updatedAt)}</span>
          <button class="btn btn-sm btn-danger" data-action="delete-ramp" data-ramp-id="${r.id}">Delete</button>
        </div>`,
                        )
                        .join('');
                    savedHTML = `<div class="saved-list">${rows}</div>`;
                }

                return `
    <div class="hero">
      <div>
        <div class="eyebrow">Risk Assessment &amp; Management Plan</div>
        <h1>Build, score and print a RAMP in minutes.</h1>
        <p>Start from a pre-built template of common AAFC hazards, or start blank. Likelihood × consequence is scored automatically against the standard SRM risk matrix — add your own hazards, write your control plans, and print or save the result as a PDF.</p>
      </div>
      <div class="matrix-wrap">${renderHeroMatrix()}</div>
    </div>

    <div class="section-label">Start a new RAMP</div>
    <div class="template-grid">${cards}${blankCard}</div>

    <div class="section-label">Saved RAMPs</div>
    ${savedHTML}

    <div style="margin-top:18px;">
      <button class="btn" data-action="import-json">Import RAMP from JSON</button>
    </div>
  `;
            }

            /* =========================================================================
   RENDER: EDITOR
   ========================================================================= */
            function renderHazard(cat, h, stagePrefix) {
                return `
    <div class="hazard" data-cat-id="${cat.id}" data-haz-id="${h.id}">
      <div class="hazard-head">
        <input class="haz-name" type="text" placeholder="Hazard name" value="${escapeAttr(h.name)}"
               data-field="name" data-cat-id="${cat.id}" data-haz-id="${h.id}">
        <button class="btn btn-sm btn-danger" data-action="delete-hazard" data-cat-id="${cat.id}" data-haz-id="${h.id}"${h.locked ? ' disabled' : ''}>Remove</button>
      </div>

      <div class="risk-row">
        <div class="stage-label">Initial risk (before controls)${h.locked ? ' · from template' : ''}</div>
        <div class="field">
          <label>Likelihood</label>
          <select data-field="initL" data-cat-id="${cat.id}" data-haz-id="${h.id}" ${h.locked ? 'disabled' : ''}>
            ${likelihoodOptions(h.initL)}
          </select>
        </div>
        <div class="field">
          <label>Consequence</label>
          <select data-field="initC" data-cat-id="${cat.id}" data-haz-id="${h.id}" ${h.locked ? 'disabled' : ''}>
            ${consequenceOptions(h.initC)}
          </select>
        </div>
        <div class="badge-wrap" data-risk="initial" data-haz-id="${h.id}">${riskBadgeHTML(h.initL, h.initC)}</div>
      </div>
      ${h.locked ? `<div class="lock-note">🔒 Initial likelihood/consequence is fixed by the template. Add a new hazard if you need a fully editable entry.</div>` : ''}

      <div class="field" style="margin-top:10px;">
        <label>Risk treatment / control plan</label>
        <textarea data-field="plan" data-cat-id="${cat.id}" data-haz-id="${h.id}" placeholder="Describe the controls in place to manage this hazard…">${escapeHTML(h.plan)}</textarea>
      </div>

      <div class="risk-row" style="margin-top:10px;">
        <div class="stage-label">Residual risk (after controls)</div>
        <div class="field">
          <label>Likelihood</label>
          <select data-field="resL" data-cat-id="${cat.id}" data-haz-id="${h.id}">
            ${likelihoodOptions(h.resL)}
          </select>
        </div>
        <div class="field">
          <label>Consequence</label>
          <select data-field="resC" data-cat-id="${cat.id}" data-haz-id="${h.id}">
            ${consequenceOptions(h.resC)}
          </select>
        </div>
        <div class="badge-wrap" data-risk="residual" data-haz-id="${h.id}">${riskBadgeHTML(h.resL, h.resC)}</div>
      </div>
    </div>
  `;
            }

            function renderCategory(cat) {
                const hazardsHTML = cat.hazards.length
                    ? cat.hazards.map((h) => renderHazard(cat, h)).join('')
                    : `<div class="no-hazards">No hazards in this category yet.</div>`;
                const missingTemplateHazards = getMissingTemplateHazards(cat);
                const restoreHTML = missingTemplateHazards.length
                    ? `<div class="restore-row"><div class="restore-note">${missingTemplateHazards.length} template hazard${missingTemplateHazards.length === 1 ? '' : 's'} available:</div>${missingTemplateHazards
                          .map(
                              (th) =>
                                  `<button class="btn btn-sm" data-action="restore-template-hazard" data-cat-id="${cat.id}" data-template-hazard-id="${th.templateHazardId}">Restore ${escapeHTML(th.name)}</button>`,
                          )
                          .join('')}</div>`
                    : '';
                const risk = categoryRisk(cat);
                return `
    <div class="category" data-cat-id="${cat.id}">
      <div class="cat-head">
        <input class="cat-name" type="text" value="${escapeAttr(cat.name)}" data-field="catname" data-cat-id="${cat.id}" placeholder="Category name">
        <span class="risk-badge${risk ? ' risk-' + risk : ''}" data-cat-risk="${cat.id}">${risk ? risk + ' · ' + RISK_LEVELS[risk].label : 'No hazards'}</span>
        <button class="btn btn-sm btn-danger" data-action="delete-category" data-cat-id="${cat.id}"${categoryHasLockedHazards(cat) ? ' disabled' : ''}>Remove category</button>
      </div>
      <div class="cat-body">
        ${hazardsHTML}
        ${restoreHTML}
        <div class="add-row">
          <button class="btn btn-sm" data-action="add-hazard" data-cat-id="${cat.id}">+ Add hazard</button>
        </div>
      </div>
    </div>
  `;
            }

            function renderEditor() {
                const r = state.ramp;
                const d = r.details;
                const categoriesHTML = r.categories.length
                    ? r.categories.map(renderCategory).join('')
                    : `<div class="app-empty"><h2>No hazard categories yet</h2><p>Add a category to start listing hazards, controls and risk ratings.</p></div>`;

                const overall = overallRisk();

                return `
    <div class="editor-grid">
      <div>
        <div class="card">
          <h2>Activity details</h2>
          <div class="field-grid">
            <div class="field"><label>Activity type</label><input type="text" data-field="details.activityType" value="${escapeAttr(d.activityType)}"></div>
            <div class="field"><label>Location</label><input type="text" data-field="details.location" value="${escapeAttr(d.location)}"></div>
            <div class="field"><label>Start date</label><input type="date" data-field="details.startDate" value="${escapeAttr(d.startDate)}"></div>
            <div class="field"><label>End date</label><input type="date" data-field="details.endDate" value="${escapeAttr(d.endDate)}"></div>
            <div class="field"><label>Owner</label><input type="text" data-field="details.owner" value="${escapeAttr(d.owner)}"></div>
            <div class="field"><label>Prepared by</label><input type="text" data-field="details.preparedBy" value="${escapeAttr(d.preparedBy)}"></div>
            <div class="field"><label>Consulted with</label><input type="text" data-field="details.consultedWith" value="${escapeAttr(d.consultedWith)}"></div>
            <div class="field"><label>Approved by</label><input type="text" data-field="details.approvedBy" value="${escapeAttr(d.approvedBy)}"></div>
          </div>
        </div>

        <div class="card">
          <h2>Context / assumptions</h2>
          <div class="field">
            <textarea data-field="context" style="min-height:120px;" placeholder="Describe the activity, key assumptions, and any planning notes…">${escapeHTML(r.context)}</textarea>
          </div>
        </div>

        <div class="section-label">Hazard categories</div>
        ${categoriesHTML}
        <button class="btn" data-action="add-category">+ Add category</button>
      </div>

      <div class="side">
        <div class="card">
          <h2>Overall risk</h2>
          <div class="overall-risk">
            <span class="lbl">Activity risk</span>
            <span id="overall-risk-badge">${riskBadgeFromLevel(overall, 'lg')}</span>
          </div>
          <div class="mini-matrix">
            ${renderMiniMatrix()}
          </div>
          <div class="legend">${renderLegend()}</div>
        </div>
      </div>
    </div>
  `;
            }

            function renderMiniMatrix() {
                let rows = '';
                for (let l = 5; l >= 1; l--) {
                    let cells = `<th>${l}</th>`;
                    CONSEQUENCES.forEach((c) => {
                        const level = RISK_MATRIX[l][c.v];
                        cells += `<td class="risk-${level}">${c.v}${l}</td>`;
                    });
                    rows += `<tr>${cells}</tr>`;
                }
                const header = `<tr><th></th>${CONSEQUENCES.map((c) => `<th>${c.v}</th>`).join('')}</tr>`;
                return `<table>${header}${rows}</table>`;
            }

            /* =========================================================================
   MAIN RENDER
   ========================================================================= */
            function render() {
                const page = document.getElementById('page');
                const titleInput = document.getElementById('ramp-title-input');
                const exportBtn = document.getElementById('btn-export');
                const printBtn = document.getElementById('btn-print');

                if (state.view === 'home') {
                    titleInput.classList.add('hidden');
                    exportBtn.classList.add('hidden');
                    printBtn.classList.add('hidden');
                    setSaveStatus('');
                    page.innerHTML = renderHome();
                } else {
                    titleInput.classList.remove('hidden');
                    exportBtn.classList.remove('hidden');
                    printBtn.classList.remove('hidden');
                    titleInput.value = state.ramp.name || '';
                    page.innerHTML = renderEditor();
                }
            }

            /* =========================================================================
   TARGETED UPDATES (avoid full re-render on every keystroke)
   ========================================================================= */
            function refreshHazardBadges(catId, hazId) {
                const h = findHazard(catId, hazId);
                if (!h) return;
                const initEl = document.querySelector(
                    `[data-risk="initial"][data-haz-id="${hazId}"]`,
                );
                const resEl = document.querySelector(
                    `[data-risk="residual"][data-haz-id="${hazId}"]`,
                );
                if (initEl) initEl.innerHTML = riskBadgeHTML(h.initL, h.initC);
                if (resEl) resEl.innerHTML = riskBadgeHTML(h.resL, h.resC);
            }
            function refreshCategoryBadge(catId) {
                const cat = findCategory(catId);
                if (!cat) return;
                const el = document.querySelector(`[data-cat-risk="${catId}"]`);
                if (el) {
                    const risk = categoryRisk(cat);
                    el.className = 'risk-badge' + (risk ? ' risk-' + risk : '');
                    el.textContent = risk
                        ? `${risk} · ${RISK_LEVELS[risk].label}`
                        : 'No hazards';
                }
            }
            function refreshOverallBadge() {
                const el = document.getElementById('overall-risk-badge');
                if (el) el.innerHTML = riskBadgeFromLevel(overallRisk(), 'lg');
            }

            /* =========================================================================
   UTILITIES
   ========================================================================= */
            function escapeHTML(str) {
                return String(str ?? '').replace(
                    /[&<>]/g,
                    (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[c],
                );
            }
            function escapeAttr(str) {
                return escapeHTML(str).replace(/"/g, '&quot;');
            }
            function formatDate(ts) {
                const d = new Date(ts);
                return (
                    d.toLocaleDateString(undefined, {
                        day: '2-digit',
                        month: 'short',
                        year: 'numeric',
                    }) +
                    ' ' +
                    d.toLocaleTimeString(undefined, {
                        hour: '2-digit',
                        minute: '2-digit',
                    })
                );
            }
            function setNested(obj, path, value) {
                const parts = path.split('.');
                let target = obj;
                for (let i = 0; i < parts.length - 1; i++)
                    target = target[parts[i]];
                target[parts[parts.length - 1]] = value;
            }

            /* =========================================================================
   EVENT HANDLING
   ========================================================================= */
            const page = document.getElementById('page');

            // Clicks (navigation + structural actions)
            page.addEventListener('click', async (e) => {
                const t = e.target.closest('[data-action]');
                if (!t) return;
                const action = t.dataset.action;

                if (action === 'new-from-template') {
                    const tpl = TEMPLATES.find(
                        (x) => x.id === t.dataset.templateId,
                    );
                    if (!tpl) return;
                    state.ramp = rampFromTemplate(tpl);
                    state.view = 'editor';
                    render();
                    scheduleSave();
                } else if (action === 'new-blank') {
                    state.ramp = blankRamp();
                    state.view = 'editor';
                    render();
                    scheduleSave();
                } else if (action === 'open-ramp') {
                    const ramp = await loadRampFromStorage(t.dataset.rampId);
                    if (ramp) {
                        state.ramp = ramp;
                        state.view = 'editor';
                        render();
                    }
                } else if (action === 'delete-ramp') {
                    if (!confirm('Delete this RAMP? This cannot be undone.'))
                        return;
                    await deleteRampFromStorage(t.dataset.rampId);
                    state.index = state.index.filter(
                        (r) => r.id !== t.dataset.rampId,
                    );
                    await saveIndex(state.index);
                    render();
                } else if (action === 'add-category') {
                    state.ramp.categories.push(newCategory());
                    render();
                    scheduleSave();
                } else if (action === 'delete-category') {
                    const cat = findCategory(t.dataset.catId);
                    if (cat && categoryHasLockedHazards(cat)) return; // Prevent deletion of categories with template hazards
                    if (!confirm('Remove this category and all its hazards?'))
                        return;
                    state.ramp.categories = state.ramp.categories.filter(
                        (c) => c.id !== t.dataset.catId,
                    );
                    render();
                    scheduleSave();
                    refreshOverallBadge();
                } else if (action === 'add-hazard') {
                    const cat = findCategory(t.dataset.catId);
                    cat.hazards.push(newHazard());
                    render();
                    scheduleSave();
                } else if (action === 'delete-hazard') {
                    const h = findHazard(t.dataset.catId, t.dataset.hazId);
                    if (h && h.locked) return; // Prevent deletion of template hazards
                    if (!confirm('Remove this hazard?')) return;
                    const cat = findCategory(t.dataset.catId);
                    cat.hazards = cat.hazards.filter(
                        (h) => h.id !== t.dataset.hazId,
                    );
                    render();
                    scheduleSave();
                } else if (action === 'restore-template-hazard') {
                    restoreTemplateHazard(
                        t.dataset.catId,
                        t.dataset.templateHazardId,
                    );
                    render();
                    scheduleSave();
                } else if (action === 'import-json') {
                    document.getElementById('import-input').click();
                }
            });

            // Text inputs / textareas (don't re-render, to preserve focus/cursor)
            page.addEventListener('input', (e) => {
                const t = e.target;
                if (!t.dataset.field) return;

                if (t.dataset.field.startsWith('details.')) {
                    setNested(state.ramp, t.dataset.field, t.value);
                } else if (t.dataset.field === 'context') {
                    state.ramp.context = t.value;
                } else if (t.dataset.field === 'catname') {
                    const cat = findCategory(t.dataset.catId);
                    if (cat) cat.name = t.value;
                } else if (t.dataset.hazId) {
                    const h = findHazard(t.dataset.catId, t.dataset.hazId);
                    if (
                        h &&
                        (t.dataset.field === 'name' ||
                            t.dataset.field === 'plan')
                    ) {
                        h[t.dataset.field] = t.value;
                    }
                }
                scheduleSave();
            });

            // Select dropdowns (likelihood/consequence) — update badges without full re-render
            page.addEventListener('change', (e) => {
                const t = e.target;
                if (!t.dataset.field || !t.dataset.hazId) return;
                const h = findHazard(t.dataset.catId, t.dataset.hazId);
                if (!h) return;
                const field = t.dataset.field;
                // Ignore empty values (from placeholder options)
                if (t.value === '') return;
                h[field] =
                    field === 'initL' || field === 'resL'
                        ? Number(t.value)
                        : t.value;
                refreshHazardBadges(t.dataset.catId, t.dataset.hazId);
                refreshCategoryBadge(t.dataset.catId);
                refreshOverallBadge();
                scheduleSave();
            });

            // RAMP title (top bar)
            document
                .getElementById('ramp-title-input')
                .addEventListener('input', (e) => {
                    state.ramp.name = e.target.value;
                    scheduleSave();
                });

            // Brand / home button
            document
                .getElementById('brand-home')
                .addEventListener('click', () => {
                    state.view = 'home';
                    render();
                });

            // Export JSON
            document
                .getElementById('btn-export')
                .addEventListener('click', () => {
                    if (!state.ramp) return;
                    const blob = new Blob(
                        [JSON.stringify(state.ramp, null, 2)],
                        { type: 'application/json' },
                    );
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const safeName = (state.ramp.name || 'ramp').replace(
                        /[^a-z0-9-_]+/gi,
                        '_',
                    );
                    a.download = `${safeName}.json`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                });

            // Import JSON
            document
                .getElementById('import-input')
                .addEventListener('change', async (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    try {
                        const text = await file.text();
                        const data = JSON.parse(text);
                        if (!data.categories)
                            throw new Error('Not a RAMP file');
                        data.id = uid('ramp'); // avoid collisions with existing saved RAMPs
                        data.updatedAt = Date.now();
                        state.ramp = data;
                        state.view = 'editor';
                        render();
                        scheduleSave();
                    } catch (err) {
                        alert(
                            'Could not import this file as a RAMP: ' +
                                err.message,
                        );
                    } finally {
                        e.target.value = '';
                    }
                });

            // Print / Export to PDF
            document
                .getElementById('btn-print')
                .addEventListener('click', () => {
                    buildPrintArea();
                    window.print();
                });

            /* =========================================================================
   PRINT VIEW
   ========================================================================= */
            function buildPrintArea() {
                const r = state.ramp;
                const d = r.details;
                const overall = overallRisk();

                const metaRows = [
                    ['Activity', r.name || 'Untitled RAMP'],
                    ['Activity type', d.activityType],
                    ['Location', d.location],
                    [
                        'Dates',
                        [d.startDate, d.endDate].filter(Boolean).join(' to '),
                    ],
                    ['Owner', d.owner],
                    ['Prepared by', d.preparedBy],
                    ['Consulted with', d.consultedWith],
                    ['Approved by', d.approvedBy],
                ].filter(([, v]) => v);

                const metaHTML = `<div class="print-meta"><table>${metaRows.map(([k, v]) => `<tr><td class="k">${escapeHTML(k)}</td><td>${escapeHTML(v)}</td></tr>`).join('')}</table></div>`;

                const categoriesHTML = r.categories
                    .map((cat) => {
                        const cr = categoryRisk(cat);
                        const rows = cat.hazards
                            .map((h) => {
                                const init = getRisk(h.initL, h.initC);
                                const res = getRisk(h.resL, h.resC);
                                return `<tr>
        <td>${escapeHTML(h.name)}</td>
        <td class="risk-cell"><span class="cat-risk risk-${init.level || ''}">${init.code} - ${init.label}</span></td>
        <td>${escapeHTML(h.plan).replace(/\n/g, '<br>')}</td>
        <td class="risk-cell"><span class="cat-risk risk-${res.level || ''}">${res.code} - ${res.label}</span></td>
      </tr>`;
                            })
                            .join('');
                        return `
      <h2>${escapeHTML(cat.name)} ${cr ? `<span class="cat-risk risk-${cr}">${cr} · ${RISK_LEVELS[cr].label}</span>` : ''}</h2>
      <table class="hazards">
        <tr><th style="width:22%">Hazard</th><th style="width:12%">Initial risk</th><th>Plan / Controls</th><th style="width:12%">Residual risk</th></tr>
        ${rows || `<tr><td colspan="4">No hazards listed.</td></tr>`}
      </table>
    `;
                    })
                    .join('');

                const html = `
    <h1>${escapeHTML(r.name || 'Untitled RAMP')}</h1>
    ${metaHTML}
    <div class="ramp-overall"><strong>Overall RAMP risk:</strong> ${overall ? `<span class="cat-risk risk-${overall}">${overall} · ${RISK_LEVELS[overall].label}</span>` : '—'}</div>
    ${r.context ? `<h2>Context / Assumptions</h2><div class="context">${escapeHTML(r.context)}</div>` : ''}
    ${categoriesHTML}
    <div class="print-foot">Generated by RAMP Builder on ${formatDate(Date.now())}</div>
  `;
                document.getElementById('print-area').innerHTML = html;
            }

            /* =========================================================================
   INIT
   ========================================================================= */
            (async function init() {
                state.index = await loadIndex();
                render();
            })();
        </script>
    </body>
</html>
